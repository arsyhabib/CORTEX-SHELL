/* CORTEX EDUCATION — Master Stylesheet */
/* Glass Effects, Animations, Backgrounds */

* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --cortex-tilt-x: 0;
  --cortex-tilt-y: 0;
  --cortex-depth-x: 0px;
  --cortex-depth-y: 0px;
  --cortex-wallpaper-shift-x: 0px;
  --cortex-wallpaper-shift-y: 0px;
  --cortex-card-tilt-x: 0deg;
  --cortex-card-tilt-y: 0deg;
  --cortex-card-shift-x: 0px;
  --cortex-card-shift-y: 0px;
  --cortex-button-tilt-x: 0deg;
  --cortex-button-tilt-y: 0deg;
  --cortex-button-shift-x: 0px;
  --cortex-button-shift-y: 0px;
  --cortex-motion-scale: 1;
  --cortex-shake-scale: 1;
  --cortex-shake-force: 0;
  --cortex-shake-x: 0px;
  --cortex-shake-y: 0px;
  --cortex-shake-x-neg: 0px;
  --cortex-shake-y-pos: 0px;
  --cortex-shake-rot: 0deg;
  --cortex-shake-rot-neg: 0deg;
  --cortex-shake-rest: 0deg;
  --cortex-touch-shift-x: 0px;
  --cortex-touch-shift-y: 0px;
  --cortex-touch-sheen-x: 0px;
  --cortex-touch-sheen-y: 0px;
  --cortex-touch-sheen-angle: 0deg;
  --cortex-touch-squash: 0;
  --cortex-touch-scale: 0;
  --cortex-touch-press: 0;
  --cortex-text-zoom: 1;
}

/* ═══════════════════════════════════════════
   KEYFRAME ANIMATIONS
   ═══════════════════════════════════════════ */

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

@keyframes float-slow {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  33% { transform: translateY(-12px) rotate(1deg); }
  66% { transform: translateY(-6px) rotate(-1deg); }
}

@keyframes pulse-glow {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.05); }
}

@keyframes slide-up {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes slide-down {
  0% { opacity: 0; transform: translateY(-20px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes scale-in {
  0% { opacity: 0; transform: scale(0.85); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes scale-bounce {
  0% { opacity: 0; transform: scale(0.5); }
  60% { transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes gradient-shift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes rotate-slow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes border-dance {
  0% { border-color: rgba(255,255,255,0.15); }
  50% { border-color: rgba(255,255,255,0.35); }
  100% { border-color: rgba(255,255,255,0.15); }
}

@keyframes glow-pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(var(--glow-rgb), 0.2); }
  50% { box-shadow: 0 0 40px rgba(var(--glow-rgb), 0.5); }
}

@keyframes text-glow {
  0%, 100% { text-shadow: 0 0 10px currentColor; }
  50% { text-shadow: 0 0 25px currentColor, 0 0 40px currentColor; }
}

@keyframes morph-blob {
  0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
  25% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
  50% { border-radius: 50% 60% 30% 60% / 40% 70% 60% 30%; }
  75% { border-radius: 60% 30% 60% 40% / 70% 40% 50% 60%; }
}

@keyframes mosaic-tile {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

@keyframes stagger-in {
  0% { opacity: 0; transform: translateY(20px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes ripple {
  0% { transform: scale(0.08); opacity: 0.22; }
  26% { opacity: 0.30; }
  100% { transform: scale(4.8); opacity: 0; }
}

@keyframes typewriter {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink-cursor {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

@keyframes scanline {
  0% { top: -10%; }
  100% { top: 110%; }
}

@keyframes particle-rise {
  0% { transform: translateY(100%) scale(0); opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 0.6; }
  100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

@keyframes wave-flow {
  0% { transform: translateX(0) translateY(0); }
  50% { transform: translateX(-25%) translateY(-5%); }
  100% { transform: translateX(0) translateY(0); }
}

@keyframes iris-open {
  0% { clip-path: circle(0% at 50% 50%); opacity: 0; }
  100% { clip-path: circle(75% at 50% 50%); opacity: 1; }
}

@keyframes slide-right {
  0% { opacity: 0; transform: translateX(-30px); }
  100% { opacity: 1; transform: translateX(0); }
}

@keyframes counter-up {
  0% { opacity: 0; transform: translateY(15px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes shine-sweep {
  0% { left: -100%; }
  100% { left: 200%; }
}

@keyframes gold-shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes buttery-pop {
  0% { opacity: 0; transform: translateY(24px) scale(0.92); filter: blur(8px); }
  55% { opacity: 1; transform: translateY(-4px) scale(1.025); filter: blur(0); }
  78% { transform: translateY(2px) scale(0.992); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}

@keyframes bubbly-breathe {
  0%, 100% { transform: translateY(0) scale(1); border-radius: 20px; }
  35% { transform: translateY(-3px) scale(1.006); border-radius: 24px; }
  70% { transform: translateY(1px) scale(0.998); border-radius: 18px; }
}

@keyframes jelly-press {
  0% { transform: scale(1); }
  32% { transform: scale(0.965, 1.035); }
  62% { transform: scale(1.018, 0.982); }
  100% { transform: scale(1); }
}

@keyframes cortex-jiggle-super {
  0% { transform: scale(1) rotate(0deg) translateY(0); }
  10% { transform: scale(0.88, 1.14) rotate(-3deg) translateY(-2px); }
  24% { transform: scale(1.12, 0.92) rotate(2.5deg) translateY(1px); }
  38% { transform: scale(0.94, 1.06) rotate(-1.8deg) translateY(-1px); }
  52% { transform: scale(1.06, 0.96) rotate(1.2deg) translateY(0.5px); }
  66% { transform: scale(0.97, 1.03) rotate(-0.7deg) translateY(0); }
  80% { transform: scale(1.02, 0.99) rotate(0.3deg); }
  100% { transform: scale(1) rotate(0deg) translateY(0); }
}

@keyframes cortex-spring-return {
  0% { transform: scale(0.92, 1.08) rotate(-1.5deg); }
  30% { transform: scale(1.06, 0.96) rotate(1deg); }
  55% { transform: scale(0.98, 1.02) rotate(-0.4deg); }
  80% { transform: scale(1.01, 0.99) rotate(0.1deg); }
  100% { transform: scale(1) rotate(0deg); }
}
@keyframes cortex-button-tap-bloom {
  0% { opacity: 0.0; transform: scale(0.94); filter: blur(1px); }
  32% { opacity: 1; transform: scale(1.02); filter: blur(0); }
  64% { transform: scale(0.985); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

@keyframes soft-wobble {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  25% { transform: rotate(-0.8deg) translateY(-2px); }
  55% { transform: rotate(0.7deg) translateY(1px); }
  80% { transform: rotate(-0.3deg) translateY(-1px); }
}

@keyframes cortex-water-ripple-ambient {
  0%, 100% { opacity: 0.14; transform: scale(0.985) rotate(0deg); }
  35% { opacity: 0.22; transform: scale(1.01) rotate(0.2deg); }
  70% { opacity: 0.16; transform: scale(1.024) rotate(-0.18deg); }
}

@keyframes liquid-sheen {
  0% { transform: translateX(-120%) skewX(-18deg); opacity: 0; }
  18% { opacity: 0.65; }
  46% { opacity: 0; }
  100% { transform: translateX(220%) skewX(-18deg); opacity: 0; }
}

@keyframes pill-jiggle {
  0% { transform: scale(1) rotate(0deg); }
  35% { transform: scale(1.08, 0.94) rotate(-1.2deg); }
  65% { transform: scale(0.98, 1.04) rotate(0.8deg); }
  100% { transform: scale(1) rotate(0deg); }
}

@keyframes cortex-touch-flop {
  0% { transform: translate3d(0, 0, 0) scale3d(1, 1, 1); }
  30% { transform: translate3d(1px, -1px, 0) scale3d(1.03, 0.97, 1); }
  58% { transform: translate3d(-1px, 1px, 0) scale3d(0.985, 1.025, 1); }
  82% { transform: translate3d(0.5px, -0.5px, 0) scale3d(1.008, 0.995, 1); }
  100% { transform: translate3d(0, 0, 0) scale3d(1, 1, 1); }
}

@keyframes cortex-wallpaper-drift {
  0%, 100% { transform: translate3d(var(--wallpaper-x, 0px), var(--wallpaper-y, 0px), 0) scale(1.07) rotate(0deg); }
  45% { transform: translate3d(calc(var(--wallpaper-x, 0px) * 1.4 + 10px), calc(var(--wallpaper-y, 0px) * 1.2 - 12px), 0) scale(1.105) rotate(0.7deg); }
  72% { transform: translate3d(calc(var(--wallpaper-x, 0px) * 0.7 - 7px), calc(var(--wallpaper-y, 0px) * 1.5 + 8px), 0) scale(1.085) rotate(-0.45deg); }
}

@keyframes cortex-wallpaper-bloom {
  0%, 100% { opacity: 0.36; transform: translate(-50%, -50%) scale(0.82); filter: blur(22px); }
  50% { opacity: 0.62; transform: translate(-50%, -50%) scale(1.14); filter: blur(16px); }
}

@keyframes cortex-ripple-pop {
  0% { opacity: 0.05; transform: translate(-50%, -50%) scale(0.18); }
  26% { opacity: 0.22; }
  72% { opacity: 0.12; }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(3.55); }
}

@keyframes cortex-live-float-a {
  0%, 100% { transform: translate3d(var(--wallpaper-x,0px), var(--wallpaper-y,0px), 0) scale(0.96) rotate(0deg); }
  33% { transform: translate3d(calc(var(--wallpaper-x,0px) * -0.7 + 22px), calc(var(--wallpaper-y,0px) * 0.8 - 18px), 0) scale(1.04) rotate(7deg); }
  66% { transform: translate3d(calc(var(--wallpaper-x,0px) * 0.9 - 18px), calc(var(--wallpaper-y,0px) * -0.6 + 20px), 0) scale(1.01) rotate(-5deg); }
}

@keyframes cortex-live-float-b {
  0%, 100% { transform: translate3d(0,0,0) rotate(var(--facet-rotate,0deg)) scale(1); }
  45% { transform: translate3d(28px,-18px,0) rotate(calc(var(--facet-rotate,0deg) + 10deg)) scale(1.05); }
  72% { transform: translate3d(-18px,16px,0) rotate(calc(var(--facet-rotate,0deg) - 6deg)) scale(0.98); }
}

@keyframes cortex-live-ribbon-drift {
  0%, 100% { transform: translate3d(calc(var(--wallpaper-x,0px) * 0.35), calc(var(--wallpaper-y,0px) * 0.22), 0) rotate(var(--ribbon-rotate,0deg)) scale(1); }
  38% { transform: translate3d(calc(var(--wallpaper-x,0px) * -0.42 + 18px), calc(var(--wallpaper-y,0px) * 0.40 - 20px), 0) rotate(calc(var(--ribbon-rotate,0deg) + 5deg)) scale(1.04); }
  70% { transform: translate3d(calc(var(--wallpaper-x,0px) * 0.20 - 22px), calc(var(--wallpaper-y,0px) * -0.36 + 16px), 0) rotate(calc(var(--ribbon-rotate,0deg) - 4deg)) scale(0.99); }
}

@keyframes cortex-live-glimmer {
  0%, 100% { opacity: 0.18; filter: blur(18px) saturate(1.05); }
  45% { opacity: 0.36; filter: blur(12px) saturate(1.25); }
  72% { opacity: 0.24; filter: blur(22px) saturate(1.15); }
}

@keyframes cortex-device-jolt {
  0%, 100% { transform: translate3d(0,0,0) rotate(0deg); }
  14% { transform: translate3d(calc(var(--cortex-shake-x, 3px) * 0.65), calc(var(--cortex-shake-y, -2px) * 0.55), 0) rotate(calc(var(--cortex-shake-rot, 0.7deg) * 0.6)); }
  30% { transform: translate3d(var(--cortex-shake-x, 3px), var(--cortex-shake-y, -2px), 0) rotate(var(--cortex-shake-rot, 0.7deg)); }
  48% { transform: translate3d(var(--cortex-shake-x-neg, -2.5px), var(--cortex-shake-y-pos, 1.5px), 0) rotate(var(--cortex-shake-rot-neg, -0.55deg)); }
  66% { transform: translate3d(calc(var(--cortex-shake-x-neg, -2.5px) * 0.45), calc(var(--cortex-shake-y-pos, 1.5px) * 0.55), 0) rotate(calc(var(--cortex-shake-rot-neg, -0.55deg) * 0.45)); }
  82% { transform: translate3d(1px, -0.6px, 0) rotate(var(--cortex-shake-rest, 0.35deg)); }
}


/* ═══════════════════════════════════════════
   THEME BUBBLE SLIDER
   ═══════════════════════════════════════════ */
.cortex-theme-slider-track {
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.cortex-theme-slider-track::-webkit-scrollbar { display: none; }
.cortex-theme-slider-track > * {
  animation: buttery-pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}
.cortex-theme-slider-track > *:nth-child(1) { animation-delay: 0.03s; }
.cortex-theme-slider-track > *:nth-child(2) { animation-delay: 0.07s; }
.cortex-theme-slider-track > *:nth-child(3) { animation-delay: 0.11s; }
.cortex-theme-slider-track > *:nth-child(4) { animation-delay: 0.15s; }
.cortex-theme-slider-track > *:nth-child(5) { animation-delay: 0.19s; }
.cortex-theme-slider-track > *:nth-child(6) { animation-delay: 0.23s; }
.cortex-theme-bubble {
  transform-origin: center;
}
.cortex-theme-bubble:active {
  animation: cortex-jiggle-super 0.7s cubic-bezier(0.18,1.14,0.28,1) !important;
}
.cortex-theme-bubble[data-active="true"]:active {
  animation: cortex-jiggle-super 0.7s cubic-bezier(0.18,1.14,0.28,1) !important;
}
.cortex-theme-bubble[data-active="true"] {
  animation: bubbly-breathe 4s ease-in-out infinite;
}
@media (hover: hover) {
  .cortex-theme-bubble:hover {
    transform: scale(1.05) translateY(-2px) !important;
    border-color: rgba(255,255,255,0.3) !important;
    box-shadow: 0 12px 36px rgba(0,0,0,0.35) !important;
  }
  .cortex-theme-bubble:hover .cortex-theme-bubble-orb {
    animation: soft-wobble 1.2s ease-in-out infinite !important;
  }
}
.cortex-theme-bubble-orb {
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
}
.cortex-theme-bubble:hover .cortex-theme-bubble-orb {
  transform: scale(1.12) rotate(-8deg) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35) !important;
}
.cortex-theme-bubble[data-active="true"] .cortex-theme-bubble-orb {
  animation: float 3s ease-in-out infinite !important;
}

/* ═══════════════════════════════════════════
   GLASS UTILITIES
   ═══════════════════════════════════════════ */

.glass-base {
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
}

.glass-heavy {
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
}

.glass-dark {
  backdrop-filter: blur(30px) saturate(150%);
  -webkit-backdrop-filter: blur(30px) saturate(150%);
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
}

/* Shimmer border effect */
.glass-shimmer {
  position: relative;
  overflow: hidden;
}
.glass-shimmer::after {
  content: '';
  position: absolute;
  top: -1px; right: -1px; bottom: -1px; left: -1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  background-size: 200% 100%;
  animation: shimmer 3s ease-in-out infinite;
  border-radius: inherit;
  pointer-events: none;
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask-composite: xor;
  padding: 1px;
}

/* Shine sweep overlay */
.glass-shine {
  position: relative;
  overflow: hidden;
}
.glass-shine::before {
  content: '';
  position: absolute;
  top: 0; width: 40%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shine-sweep 4s ease-in-out infinite;
  pointer-events: none;
  z-index: 1;
}

/* ═══════════════════════════════════════════
   SCROLL UTILITIES
   ═══════════════════════════════════════════ */

.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* ═══════════════════════════════════════════
   ANIMATION UTILITY CLASSES
   ═══════════════════════════════════════════ */

.anim-float { animation: float 4s ease-in-out infinite; }
.anim-float-slow { animation: float-slow 6s ease-in-out infinite; }
.anim-pulse { animation: pulse-glow 3s ease-in-out infinite; }
.anim-gradient { 
  background-size: 200% 200%;
  animation: gradient-shift 6s ease infinite; 
}
.anim-rotate { animation: rotate-slow 20s linear infinite; }

/* Stagger children animation */
.stagger-children > * {
  animation: stagger-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}
.stagger-children > *:nth-child(1) { animation-delay: 0.05s; }
.stagger-children > *:nth-child(2) { animation-delay: 0.1s; }
.stagger-children > *:nth-child(3) { animation-delay: 0.15s; }
.stagger-children > *:nth-child(4) { animation-delay: 0.2s; }
.stagger-children > *:nth-child(5) { animation-delay: 0.25s; }
.stagger-children > *:nth-child(6) { animation-delay: 0.3s; }
.stagger-children > *:nth-child(7) { animation-delay: 0.35s; }
.stagger-children > *:nth-child(8) { animation-delay: 0.4s; }
.stagger-children > *:nth-child(9) { animation-delay: 0.45s; }
.stagger-children > *:nth-child(10) { animation-delay: 0.5s; }

/* Bounce easing */
.bounce-in {
  animation: scale-bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}

/* Smooth page transitions */
.page-enter {
  animation: slide-up 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
}

.page-exit {
  animation: slide-up 0.3s ease reverse backwards;
}

@keyframes cortex-page-enter-forward {
  0% { opacity: 0; transform: translate3d(24px, 0, 0) scale(0.985); filter: blur(2px); }
  62% { opacity: 1; transform: translate3d(-2px, 0, 0) scale(1.004); filter: blur(0); }
  100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: blur(0); }
}

@keyframes cortex-page-enter-back {
  0% { opacity: 0; transform: translate3d(-22px, 0, 0) scale(0.985); filter: blur(2px); }
  64% { opacity: 1; transform: translate3d(2px, 0, 0) scale(1.004); filter: blur(0); }
  100% { opacity: 1; transform: translate3d(0, 0, 0) scale(1); filter: blur(0); }
}

.cortex-library-content.cortex-page-enter-forward,
.cortex-library-content.cortex-page-enter-back {
  will-change: transform, opacity, filter;
}

.cortex-library-content.cortex-page-enter-forward {
  animation: cortex-page-enter-forward 0.56s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}

.cortex-library-content.cortex-page-enter-back {
  animation: cortex-page-enter-back 0.64s cubic-bezier(0.12, 0.9, 0.2, 1) backwards;
}

/* Batch 2/3 motion: Claude-like buttery, bubbly, jiggly layer */
.cortex-motion-page > * {
  animation: buttery-pop 0.72s cubic-bezier(0.16, 1, 0.3, 1) backwards;
}
.cortex-motion-page > *:nth-child(1) { animation-delay: 0.03s; }
.cortex-motion-page > *:nth-child(2) { animation-delay: 0.08s; }
.cortex-motion-page > *:nth-child(3) { animation-delay: 0.13s; }
.cortex-motion-page > *:nth-child(4) { animation-delay: 0.18s; }
.cortex-motion-page > *:nth-child(5) { animation-delay: 0.23s; }
.cortex-motion-page > *:nth-child(6) { animation-delay: 0.28s; }
.cortex-motion-page > *:nth-child(7) { animation-delay: 0.33s; }
.cortex-motion-page > *:nth-child(8) { animation-delay: 0.38s; }
.cortex-motion-page > *:nth-child(9) { animation-delay: 0.43s; }
.cortex-motion-card {
  position: relative;
  transform-origin: center;

/* ios-frame.jsx */
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar

/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';

    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',

          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>

}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>

        display: 'flex', alignItems: 'center', justifyContent: 'space-between',

        {/* back chevron */}

            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>

            <circle cx="11" cy="3" r="2.5" fill={muted}/>

        fontSize: 34, fontWeight: 700, lineHeight: '41px',

    </div>
  );
}

// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (

      display: 'flex', alignItems: 'center', minHeight: 52,

        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}

        <div style={{
          position: 'absolute', bottom: 0, right: 0,

        }} />

}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';

        background: bg, borderRadius: 26,

function IOSDevice({

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />

          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;

}

function TweakText({ label, value, placeholder, onChange }) {

             onChange={(e) => onChange(e.target.value)} />

}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}

      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

// rest stacked in a sharp column on the right. onChange emits the

            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function NeuralBackground() {
  const canvasRef = React.useRef(null);
  const theme = useTheme();
  React.useEffect(() => {
    const c = canvasRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    let w = c.width = c.parentElement.offsetWidth;
    let h = c.height = c.parentElement.offsetHeight;
    const nodes = Array.from({length: 35}, () => ({
      x: Math.random()*w, y: Math.random()*h,
      vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
      r: Math.random()*3+1, pulse: Math.random()*Math.PI*2
    }));
    let raf;
    function draw(t) {
      ctx.clearRect(0,0,w,h);
      nodes.forEach(n => {
        n.x += n.vx; n.y += n.vy;
        if(n.x<0||n.x>w) n.vx*=-1;
        if(n.y<0||n.y>h) n.vy*=-1;
        n.pulse += 0.02;
      });
      nodes.forEach((a,i) => {
        nodes.forEach((b,j) => {
          if(i>=j) return;
          const d = Math.hypot(a.x-b.x, a.y-b.y);
          if(d<120) {
            const alpha = (1-d/120)*0.25;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(168,85,247,${alpha})`;
            ctx.lineWidth = 0.8; ctx.stroke();
          }
        });
        const glow = Math.sin(a.pulse)*0.4+0.6;
        ctx.beginPath(); ctx.arc(a.x, a.y, a.r*glow*2, 0, Math.PI*2);
        ctx.fillStyle = `rgba(168,85,247,${glow*0.3})`;
        ctx.fill();
        ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(200,160,255,${glow*0.8})`;
        ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    }
    draw(0);
    return () => cancelAnimationFrame(raf);
  }, []);
  return React.createElement('canvas', {
    ref: canvasRef,
    style: { position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.6 }
  });
}

/* ── Animated Counter ── */
function B1Counter({ end, duration = 1200, suffix = '' }) {
  const [v, setV] = React.useState(0);
  React.useEffect(() => {
    const s = Date.now();
    const tick = () => {
      const p = Math.min(1, (Date.now()-s)/duration);
      setV(Math.round((1-Math.pow(1-p,3))*end));
      if(p<1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [end]);
  return React.createElement('span', null, `${v.toLocaleString()}${suffix}`);
}

/* ── Ripple effect on tap ── */
function B1Ripple({ children, style }) {
  const ref = React.useRef(null);
  const handleClick = (e) => {
    const el = ref.current; if(!el) return;
    const rect = el.getBoundingClientRect();
    const r = document.createElement('span');
    const d = Math.max(rect.width, rect.height);
    r.style.cssText = `position:absolute;width:${d}px;height:${d}px;border-radius:50%;
      background:rgba(168,85,247,0.2);left:${e.clientX-rect.left-d/2}px;
      top:${e.clientY-rect.top-d/2}px;animation:ripple 0.6s ease-out;pointer-events:none;`;
    el.appendChild(r);
    setTimeout(()=>r.remove(),600);
  };
  return React.createElement('div', {
    ref, onClick: handleClick,
    style: { position:'relative', overflow:'hidden', ...style }
  }, children);
}

/* ── Global ripple tap feedback ── */
(function cortexInstallRippleFeedback() {
  if (window.__cortexRippleFeedbackInstalled) return;
  window.__cortexRippleFeedbackInstalled = true;
  const lastRippleAt = new WeakMap();
  const selector = [
    ".b1-card",
    ".b1-button",
    ".b1-toggle",
    ".b1-search-input",
    ".cortex-motion-sensor-control",
    ".cortex-library-nav button",
    ".cortex-wallpaper-toggle button",
  ].join(",");

  const spawnRipple = (target, event) => {
    if (!target || !target.getBoundingClientRect) return;
    const rect = target.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    const coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
    if (coarse) return;
    const now = performance.now();
    const lastAt = lastRippleAt.get(target) || 0;
    if (now - lastAt < 180) return;
    lastRippleAt.set(target, now);
    const ink = document.createElement('span');
    const size = Math.max(rect.width, rect.height) * 1.24;
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    ink.className = 'cortex-ripple-ink';
    ink.style.width = size + 'px';
    ink.style.height = size + 'px';
    ink.style.left = x + 'px';
    ink.style.top = y + 'px';
    target.appendChild(ink);
    window.setTimeout(() => ink.remove(), 1540);
  };

  const onPointerDown = event => {
    if (event.button != null && event.button !== 0) return;
    const target = event.target && event.target.closest ? event.target.closest(selector) : null;
    if (!target) return;
    spawnRipple(target, event);
  };

  document.addEventListener("pointerdown", onPointerDown, true);
})();

  if (rects.length) {
    return rects.reduce((acc, rect) => ({
      left: Math.min(acc.left, rect.left),
      top: Math.min(acc.top, rect.top),
      right: Math.max(acc.right, rect.right),
      bottom: Math.max(acc.bottom, rect.bottom),
      width: Math.max(acc.right, rect.right) - Math.min(acc.left, rect.left),
      height: Math.max(acc.bottom, rect.bottom) - Math.min(acc.top, rect.top),
    }), {
      left: rects[0].left,
      top: rects[0].top,
      right: rects[0].right,
      bottom: rects[0].bottom,
      width: rects[0].width,
      height: rects[0].height,
    });
  }
  const rect = range.getBoundingClientRect ? range.getBoundingClientRect() : null;
  if (!rect || (!rect.width && !rect.height)) return null;

/** Detect if opened via file:// protocol (blocks fetch) */
function cortexIsLocalFile() {
  return typeof window !== 'undefined' && window.location && window.location.protocol === 'file:';
}

function cortexWithCacheBust(path) {
  const text = String(path || '').trim();
  if (!text) return text;
  return text.includes('?') ? `${text}&v=${CORTEX_BUILD_TAG}` : `${text}?v=${CORTEX_BUILD_TAG}`;
}

function cortexFetchJSON(path) {
  if (cortexIsLocalFile()) {
    return Promise.reject(new Error('file:// protocol does not support fetch. Serve via HTTP: npx serve .'));
  }
  return fetch(cortexWithCacheBust(path), { cache:'no-store' }).then((response) => {
    if (!response.ok) throw new Error(`Failed to load ${path}: ${response.status}`);
    return response.json();
  });
}

async function cortexFetchJSONCandidates(paths, validate) {
  if (cortexIsLocalFile()) {
    throw new Error('file:// protocol does not support fetch. Serve via HTTP: npx serve .');
  }
  let lastError = null;
  for (const path of paths) {
    try {
      const data = await cortexFetchJSON(path);
      if (typeof validate === 'function' && !validate(data)) {
        lastError = new Error(`Invalid payload at ${path}`);
        continue;
      }
      return { data, path };
    } catch (error) {
      lastError = error;
    }
  }
  throw lastError || new Error('Unable to load JSON candidates');
}

function cortexSentenceCase(value) {
  const text = String(value || '').replace(/\s+/g, ' ').trim();

function cortexLectureRawText(value) {

function cortexLectureDisplayText(value, moduleTitle = '') {
  let text = cortexLectureRawText(value);
  if (!text) return '';
  text = text.replace(/^Bagian ini menyoroti:\s*/i, '');
  text = text.replace(/^Fokus belajar:\s*/i, '');
  if (/^\d+\.?$/.test(text)) return '';
  if (/^\d{6,}(?:\s+\d{1,4})?\.?$/.test(text)) return '';
  if (/^\d{1,2}\/\d{1,2}\/\d{4}(?:\s+\d{1,4})?\.?$/.test(text)) return '';
  if (/^Udah ulang rekaman\b/i.test(text)) return '';
  if (/^Ga ulang tanya jawab\b/i.test(text)) return '';
  if (/^S\d+:\s*FK\b/i.test(text)) return '';
  if (/^Visual dan media placeholder\.?$/i.test(text)) text = 'Galeri visual dan media';
  if (/^Source slide gallery placeholder:\s*/i.test(text)) {
    text = text.replace(/^Source slide gallery placeholder:\s*/i, 'Galeri slide sumber: ');
  }
  if (/^Modul ini tidak lagi mengandalkan OCR rapuh\.?/i.test(text)) {
    text = 'Halaman sumber asli dipertahankan sebagai atlas penuh.';
  }
  if (/^Fallback atlas dipakai karena/i.test(text)) {
    text = 'Atlas sumber penuh dipakai sebagai rujukan halaman saat narasi belum stabil.';
  }
  if (/^source-preserving extraction\.?$/i.test(text)) return '';
  if (/^lecturer-derived structured content;.*$/i.test(text)) return '';
  if (/^placeholder$/i.test(text)) return '';
  if (/^Materi inti\.?$/i.test(text) && moduleTitle) return cortexSentenceCase(moduleTitle);
  if (/^Segmen materi \d+\.?$/i.test(text) && moduleTitle) return cortexSentenceCase(moduleTitle);
  text = text.replace(/\bplaceholder\b/ig, '').replace(/\s+/g, ' ').trim();
  if (!text) return '';
  if (moduleTitle && /^materi inti$/i.test(text)) return cortexSentenceCase(moduleTitle);
  return cortexSentenceCase(text);
}

}

function cortexGetLectureSummary(module, limit = 5) {
  const moduleTitle = String(module && module.title || '').trim();
  const summary = Array.isArray(module && module.summary) ? module.summary : [];
  const examFocus = Array.isArray(module && module.exam_focus) ? module.exam_focus : [];
  const merged = [...summary, ...examFocus]
    .map((item) => cortexLectureSummaryText(item, moduleTitle))
    .filter(Boolean);
  const unique = [];
  merged.forEach((item) => {
    if (!unique.some((existing) => existing.toLowerCase() === item.toLowerCase())) unique.push(item);
  });
  if (unique.length < limit) {
    cortexGetLectureSections(module, 12).forEach((section) => {
      if (unique.length >= limit) return;
      const candidates = [
        cortexLectureSummaryText(section.summary, moduleTitle),
        cortexLectureSummaryText(section.title, moduleTitle),
      ].filter(Boolean);
      candidates.forEach((candidate) => {
        if (unique.length < limit && !unique.some((existing) => existing.toLowerCase() === candidate.toLowerCase())) {
          unique.push(candidate);

function cortexHumanizeVisualTarget(value) {
  const text = String(value || '').trim();
  if (!text) return '';
  const [head, tailRaw = ''] = text.split(':');
  const headLabel = cortexSentenceCase(
    head
      .replace(/^page_/i, '')
      .replace(/^page/i, '')
      .replace(/[_-]+/g, ' ')
      .replace(/\bmcq\b/gi, 'MCQ')
      .replace(/\bq(\d+)/gi, 'Q$1')
  );
  const tail = String(tailRaw || '').replace(/[_-]+/g, ' ').trim();
  return tail ? `${headLabel} · ${tail}` : headLabel;
}

function cortexResolveVisualAssets(manifest) {
  const raw = Array.isArray(manifest && manifest.assets)
    ? manifest.assets
    : Array.isArray(manifest && manifest.visual_assets)
      ? manifest.visual_assets
      : [];
  const priorityOrder = { high: 0, medium: 1, normal: 1, low: 2 };
  return raw.map((asset, index) => {
    const id = String(asset.id || asset.asset_id || `visual_${index + 1}`);
    const batchId = String(asset.batchId || asset.batch_id || '');
    const domainId = String(asset.domainId || asset.domain || '');
    const title = cortexLectureDisplayText(asset.title || '', '') || String(asset.title || '').trim();
    const type = String(asset.type || asset.visual_type || '').replace(/\bplaceholder\b/ig, '').replace(/\s+/g, ' ').trim();
    const pageTargets = Array.isArray(asset.pageTargets || asset.page_targets)
      ? (asset.pageTargets || asset.page_targets).map((target) => String(target || '').trim()).filter(Boolean)
      : [];
    const caption = cortexLectureDisplayText(asset.caption || '', '') || String(asset.caption || '').trim();
    const altText = cortexLectureDisplayText(asset.altText || asset.alt_text || asset.alt || '', '') || String(asset.altText || asset.alt_text || asset.alt || '').trim();
    const styleNotes = String(asset.styleNotes || asset.style_notes || '').trim();
    const compositionNotes = String(asset.compositionNotes || asset.composition_notes || '').trim();
    const colorNotes = String(asset.colorNotes || asset.color_notes || '').trim();
    const prompt = String(asset.prompt || '').trim();
    const negativePrompt = String(asset.negativePrompt || asset.negative_prompt || '').trim();
    const priority = String(asset.priority || 'normal').toLowerCase();
    return {
      id,
      batchId,
      batchLabel: cortexSentenceCase(batchId.replace(/[_-]+/g, ' ')) || `Batch ${index + 1}`,
      domainId,
      domainLabel: cortexSentenceCase(domainId.replace(/[_-]+/g, ' ')),
      title,
      type,
      typeLabel: cortexSentenceCase(type.replace(/[_-]+/g, ' ')),
      pageTargets,
      caption,
      altText,
      styleNotes,
      compositionNotes,
      colorNotes,
      prompt,
      negativePrompt,
      priority,
      priorityWeight: priorityOrder[priority] ?? 1,
      searchText: [
        id, batchId, batchId.replace(/[_-]+/g, ' '), domainId, domainId.replace(/[_-]+/g, ' '),
        title, type, caption, altText, styleNotes, compositionNotes, colorNotes, pageTargets.join(' '),
      ].join(' ').toLowerCase(),
    };
  }).sort((a, b) => {
    const batchA = Number((a.batchId.match(/batch_(\d+)/i) || [])[1] || 0);
    const batchB = Number((b.batchId.match(/batch_(\d+)/i) || [])[1] || 0);
    if (batchA !== batchB) return batchA - batchB;
    if (a.priorityWeight !== b.priorityWeight) return a.priorityWeight - b.priorityWeight;
    return a.title.localeCompare(b.title);
  });
}

function cortexVisualPosterTitleLines(asset) {
  const text = String(asset && asset.title ? asset.title : '').trim();
  if (!text) return ['Untitled visual'];
  const words = text.split(/\s+/);
  const lines = [];
  let current = '';
  words.forEach((word) => {
    const next = current ? `${current} ${word}` : word;
    if (next.length > 18 && current) {
      lines.push(current);
      current = word;
    } else {
      current = next;
    }
  });
  if (current) lines.push(current);
  return lines.slice(0, 3);
}

function cortexVisualPosterStyle(asset, selected = false) {
  const [a, b, c] = cortexVisualPalette(`${asset.id}:${asset.domainId}:${asset.type}`);
  return {
    backgroundImage: [
      `radial-gradient(circle at 20% 18%, ${a}44 0%, transparent 31%)`,
      `radial-gradient(circle at 82% 22%, ${b}35 0%, transparent 25%)`,
      `radial-gradient(circle at 50% 88%, ${c}2e 0%, transparent 34%)`,
      `linear-gradient(145deg, ${a}18, ${b}15 52%, ${c}12)`,
    ].join(', '),
    border:`1px solid ${selected ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.10)'}`,
    boxShadow:selected
      ? `0 22px 70px ${DL.shadowColor}, inset 0 1px 0 rgba(255,255,255,0.10)`
      : `0 14px 42px ${DL.shadowColor}, inset 0 1px 0 rgba(255,255,255,0.06)`,
  };
}

function cortexResolveLectureDomains(index) {
  return Array.isArray(index && index.lectureDomains) ? index.lectureDomains : [];
}

function cortexResolveExamSets(index) {
  return (Array.isArray(index && index.examSets) ? index.examSets : [])
    .filter((set) => set && set.title)
    .map((set) => Object.assign({}, set, {
      questionCount: Number(set.questionCount || 0),
      sourceFile: String(set.sourceFile || '').trim(),
    }));
}

  async function runChatCore(promptText,historyArr,attached){

/* cortex-motion-sensors.jsx */
/* CORTEX - PWA motion sensor layer
   Subtle gyro tilt and shake impulse for browser/PWA contexts. */

function cortexClampMotion(value, min, max) {
  return Math.max(min, Math.min(max, value || 0));
}

function cortexSetMotionVars(x, y, force) {
  const root = document.documentElement;
  root.style.setProperty('--cortex-tilt-x', x.toFixed(3));
  root.style.setProperty('--cortex-tilt-y', y.toFixed(3));
  const tiltMagnitude = Math.min(1, Math.abs(x) + Math.abs(y));
  const motionScale = 1 + Math.min(0.048, tiltMagnitude * 0.019 + Math.max(0, force || 0) * 0.005);
  root.style.setProperty('--cortex-motion-scale', motionScale.toFixed(3));
  root.style.setProperty('--cortex-depth-x', `${(x * 13).toFixed(2)}px`);
  root.style.setProperty('--cortex-depth-y', `${(y * 11).toFixed(2)}px`);

function CortexMotionSensorControl() {
  const supported = typeof window !== 'undefined' &&
    ('DeviceOrientationEvent' in window || 'DeviceMotionEvent' in window);
  const needsGesture = typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function';
  const [status, setStatus] = React.useState(supported ? 'idle' : 'unsupported');
  const motionRef = React.useRef({
    active:false,
    x:0,
    y:0,
    lastForce:0,
    lastShake:0,
    frame:null,
  });

  React.useEffect(() => {
    document.documentElement.dataset.motionSensor = status;
    document.documentElement.classList.toggle('cortex-sensor-active', status === 'active');
    document.documentElement.classList.toggle('cortex-sensor-unsupported', status === 'unsupported');
    return () => {
      document.documentElement.classList.remove('cortex-sensor-active', 'cortex-sensor-unsupported');
      document.documentElement.removeAttribute('data-motion-sensor');
    };
  }, [status]);

  React.useEffect(() => {
    return () => {
      if (motionRef.current.frame) cancelAnimationFrame(motionRef.current.frame);
      cortexSetMotionVars(0, 0, 0);
    };
  }, []);

  const attach = React.useCallback(() => {
    if (motionRef.current.active) return;
    motionRef.current.active = true;
    setStatus('active');

      const write = (nextX, nextY, force) => {
        if (motionRef.current.frame) cancelAnimationFrame(motionRef.current.frame);
        motionRef.current.frame = requestAnimationFrame(() => {
          motionRef.current.x = motionRef.current.x * 0.79 + nextX * 0.21;
          motionRef.current.y = motionRef.current.y * 0.79 + nextY * 0.21;
          cortexSetMotionVars(motionRef.current.x, motionRef.current.y, force || 0);
        });
      };

    const onOrientation = event => {
      const gamma = cortexClampMotion(event.gamma || 0, -32, 32);
      const beta = cortexClampMotion((event.beta || 0) - 20, -38, 38);
      const x = cortexClampMotion(gamma / 32, -1, 1);
      const y = cortexClampMotion(beta / 38, -1, 1);
      write(x, y, 0);
    };

    const onMotion = event => {
      const a = event.accelerationIncludingGravity || event.acceleration;
      if (!a) return;
      const force = Math.sqrt((a.x || 0) ** 2 + (a.y || 0) ** 2 + (a.z || 0) ** 2);
      const delta = Math.abs(force - motionRef.current.lastForce);
      motionRef.current.lastForce = force;
      const now = performance.now();
      if (delta > 7.1 && now - motionRef.current.lastShake > 540) {
        motionRef.current.lastShake = now;
        const jolt = Math.min(delta / 15, 1);
        document.documentElement.style.setProperty('--cortex-shake-force', jolt.toFixed(3));
        document.documentElement.style.setProperty('--cortex-shake-scale', `${(1 + jolt * 0.042).toFixed(3)}`);
        document.documentElement.style.setProperty('--cortex-shake-x', `${(jolt * 4.0).toFixed(2)}px`);
        document.documentElement.style.setProperty('--cortex-shake-y', `${(jolt * -3.3).toFixed(2)}px`);
        document.documentElement.style.setProperty('--cortex-shake-x-neg', `${(jolt * -3.5).toFixed(2)}px`);
        document.documentElement.style.setProperty('--cortex-shake-y-pos', `${(jolt * 2.5).toFixed(2)}px`);
        document.documentElement.style.setProperty('--cortex-shake-rot', `${(jolt * 1.1).toFixed(3)}deg`);
        document.documentElement.style.setProperty('--cortex-shake-rot-neg', `${(jolt * -0.88).toFixed(3)}deg`);
        document.documentElement.style.setProperty('--cortex-shake-rest', `${(jolt * 0.34).toFixed(3)}deg`);
        document.documentElement.classList.add('cortex-device-shake');
        window.setTimeout(() => {
          document.documentElement.classList.remove('cortex-device-shake');
          document.documentElement.style.setProperty('--cortex-shake-scale', '1');
        }, 720);
      }
    };

    window.addEventListener('deviceorientation', onOrientation, { passive:true });
    window.addEventListener('devicemotion', onMotion, { passive:true });

    motionRef.current.detach = () => {
      window.removeEventListener('deviceorientation', onOrientation);
      window.removeEventListener('devicemotion', onMotion);
      motionRef.current.active = false;
      cortexSetMotionVars(0, 0, 0);
      document.documentElement.style.setProperty('--cortex-shake-scale', '1');
    };
  }, []);

  const enable = React.useCallback(async () => {
    if (!supported) {
      setStatus('unsupported');
      return;
    }
    try {
      const requests = [];
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        requests.push(DeviceOrientationEvent.requestPermission());
      }
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        requests.push(DeviceMotionEvent.requestPermission());
      }
      const results = await Promise.all(requests);
      if (results.some(result => result !== 'granted')) {
        setStatus('denied');
        return;
      }
      attach();
    } catch (error) {
      setStatus('denied');
    }
  }, [attach, supported]);

  const disable = React.useCallback(() => {
    if (motionRef.current.detach) motionRef.current.detach();
    setStatus(supported ? 'idle' : 'unsupported');
  }, [supported]);

  const label = status === 'active' ? 'Gyro on'
    : status === 'denied' ? 'Gyro off'
    : status === 'unsupported' ? 'No gyro'
    : needsGesture ? 'Enable gyro' : 'Gyro';
  const color = status === 'active' ? DL.teal
    : status === 'denied' ? DL.gold
    : status === 'unsupported' ? DL.mute
    : DL.accent;

  return React.createElement('button', {
    type:'button',
    className:'cortex-motion-sensor-control cortex-motion-press',
    onClick:status === 'active' ? disable : enable,
    title:status === 'active'
      ? 'Motion sensor is active'
      : 'Enable subtle gyro tilt and shake response',
    'data-status':status,
    style:{ '--sensor-color':color },
  },
    React.createElement('span', { className:'sensor-dot' }),
    React.createElement('span', { className:'sensor-label-full' }, label),
    React.createElement('span', { className:'sensor-label-short' }, 'Gyro')
  );
}

    const w = window.innerWidth;
    const h = window.innerHeight;
    const coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
    if (w >= 1180) return 'desktop';
    if (w >= 760 || (coarse && Math.min(w, h) >= 700)) return 'tablet';

  };
  const [mode, setMode] = React.useState(detect);
  React.useEffect(() => {
    const onResize = () => setMode(detect());
    window.addEventListener('resize', onResize);
    window.addEventListener('orientationchange', onResize);
    return () => {
      window.removeEventListener('resize', onResize);
